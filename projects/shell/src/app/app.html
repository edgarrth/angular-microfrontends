<header class="topbar">
  <a class="brand" routerLink="/">Payment Processing PoC</a>

  @if (session()) {
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/accounts" routerLinkActive="active">Accounts</a>
      <a routerLink="/payments" routerLinkActive="active">Payments</a>
      <a routerLink="/notifications" routerLinkActive="active">Notifications</a>
    </nav>
  }

  <div class="session-area">
    @if (session(); as user) {
      <span class="user">{{ user.displayName }}</span>
      <button type="button" class="logout" (click)="logout()">Cerrar sesión</button>
    } @else {
      <a class="login" routerLink="/login">Iniciar sesión</a>
    }
  </div>
</header>

<main class="shell">
  <router-outlet />
</main>
